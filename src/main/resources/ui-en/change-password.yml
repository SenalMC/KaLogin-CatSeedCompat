Body:

  # Welcome message (MiniMessage format)
  welcome:
    type: 'message'
    text: |
      <gradient:gold:red>Change Password<reset>
      &9For your account security, please change your password regularly'

  # Server icon item
  lock_item:
    type: 'item'
    material: 'iron_door'
    name: '&a&lSecurity Notice'
    description: '&fChanging your password is an important step to protect your account'
    # item_model parameter (1.21.7+ custom item model)
    # Format: namespace:path (e.g. minecraft:diamond or myplugin:custom_model)
    # Examples:
    #   item_model: 'minecraft:diamond'      # Use the diamond model
    #   item_model: 'myplugin:custom_sword'  # Use a custom plugin item model
    #   item_model: ''                       # No custom model (default)
    item_model: ''

  # Instruction message
  intro:
    type: 'message'
    text: '&7Enter your old password, new password, and confirm new password in the fields below.'

  # Password requirements hint
  password_requirements:
    type: 'message'
    text: '&ePassword requirements: &fMinimum 6 characters, maximum 20 characters, must meet complexity rules'
