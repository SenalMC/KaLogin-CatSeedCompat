Body:

  # Welcome message (MiniMessage format)
  welcome:
    type: 'message'
    text: |
      <gradient:green:aqua>Welcome to the server!<reset>
      Please set your password to start playing'

  # Server icon item
  apple_item:
    type: 'item'
    material: 'apple'
    name: '&a&lServer Icon'
    description: '&fThis is the server icon description'
    # item_model parameter (1.21.7+ custom item model)
    # Format: namespace:path (e.g. minecraft:diamond or myplugin:custom_model)
    # Examples:
    #   item_model: 'minecraft:diamond'      # Use the diamond model
    #   item_model: 'myplugin:custom_sword'  # Use a custom plugin item model
    #   item_model: ''                       # No custom model (default)
    item_model: 'minecraft:diamond'

  # Instruction message
  intro:
    type: 'message'
    text: '&7Set your password in the field below. Make sure it is strong enough.'

  # Password requirements hint
  password_requirements:
    type: 'message'
    text: '&ePassword requirements: &fMinimum 6 characters, maximum 20 characters'

  # Clickable text (hovertext example)
  hovertext_demo:
    type: 'message'
    text: '&7Click <text=&b[ Website ];hover=&7Open website;url=https://example.com> to visit our website'
