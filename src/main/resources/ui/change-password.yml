Body:

  # 欢迎语（使用MiniMessage格式）
  welcome:
    type: 'message'
    text: |
      <gradient:gold:red>修改密码<reset>
      &9为了账号安全，请定期修改密码'

  # 服务器图标物品
  lock_item:
    type: 'item'
    material: 'iron_door'
    name: '&a&l安全提示'
    description: '&f修改密码是保护账号安全的重要措施'
    # item_model 参数（1.21.7+ 自定义物品模型）
    # 格式: namespace:path (例如: minecraft:diamond 或 myplugin:custom_model)
    # 示例:
    #   item_model: 'minecraft:diamond'    # 使用钻石模型
    #   item_model: 'myplugin:custom_sword'  # 使用自定义插件物品模型
    #   item_model: ''                    # 不使用自定义模型（默认）
    item_model: ''

  # 提示信息
  intro:
    type: 'message'
    text: '&7请在下方依次输入旧密码、新密码和确认新密码。'

  # 密码要求提示
  password_requirements:
    type: 'message'
    text: '&e密码要求：&f最少6位，最多20位，需符合密码复杂度要求'
